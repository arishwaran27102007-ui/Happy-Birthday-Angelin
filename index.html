<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Angelin 🎂</title>
    <style>
        :root {
            --primary-pink: #ff6b6b;
            --soft-gold: #ffd700;
            --bg-color: #fff5f5;
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            overflow-x: hidden;
            height: 100%;
        }

        /* Initial Landing Page */
        #landing-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            transition: opacity 0.8s ease;
        }

        .envelope {
            font-size: 80px;
            cursor: pointer;
            animation: bounce 2s infinite;
        }

        h1 { color: var(--primary-pink); margin-bottom: 20px; }

        .btn-celebrate {
            padding: 15px 40px;
            font-size: 1.2rem;
            background-color: var(--primary-pink);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.4);
            transition: transform 0.2s;
        }

        .btn-celebrate:hover { transform: scale(1.1); }

        /* Celebration Page (Hidden by default) */
        #celebration-page {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
            position: relative;
            overflow: hidden;
        }

        .message {
            z-index: 10;
            text-align: center;
            color: white;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.2);
            animation: popIn 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .message h2 { font-size: 4rem; margin: 0; }
        .message p { font-size: 1.5rem; }

        /* Confetti Animation */
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: var(--soft-gold);
            top: -10px;
            animation: fall linear forwards;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-20px);}
            60% {transform: translateY(-10px);}
        }

        @keyframes popIn {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        @keyframes fall {
            to {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div id="landing-page">
        <div class="envelope">✉️</div>
        <h1>Hey Angelin, I have a surprise for you!</h1>
        <button class="btn-celebrate" onclick="startCelebration()">Celebrate!</button>
    </div>

    <div id="celebration-page">
        <div class="message">
            <h2>Happy Birthday, Angelin! 🥳</h2>
            <p>Wishing you a day filled with love and laughter!</p>
            <div style="font-size: 50px;">🎂✨🎁</div>
        </div>
    </div>

    <script>
        function startCelebration() {
            // Hide first page, show second
            document.getElementById('landing-page').style.display = 'none';
            const celebPage = document.getElementById('celebration-page');
            celebPage.style.display = 'flex';

            // Create Confetti
            for (let i = 0; i < 100; i++) {
                createConfetti();
            }
        }

        function createConfetti() {
            const confetti = document.createElement('div');
            confetti.classList.add('confetti');
            confetti.style.left = Math.random() * 100 + "vw";
            confetti.style.backgroundColor = `hsl(${Math.random() * 360}, 70%, 60%)`;
            confetti.style.animationDuration = (Math.random() * 3 + 2) + "s";
            confetti.style.opacity = Math.random();
            document.getElementById('celebration-page').appendChild(confetti);
            
            // Remove confetti after animation ends
            setTimeout(() => { confetti.remove(); }, 5000);
        }
    </script>
</body>
</html>
