<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Angelin | Liquid Glass Edition</title>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.12);
            --glass-border: rgba(255, 255, 255, 0.25);
            --accent-color: #ffdada;
            --text-color: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            /* Deep aesthetic background for glass refraction */
            background: linear-gradient(45deg, #0f0c29, #302b63, #24243e);
            color: var(--text-color);
        }

        /* Animated background blobs for the "Liquid" effect */
        .bg-blobs {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: -1;
            filter: blur(80px);
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 105, 180, 0.4);
            animation: move 20s infinite alternate;
        }

        .blob1 { width: 400px; height: 400px; top: -100px; left: -100px; background: rgba(138, 43, 226, 0.3); }
        .blob2 { width: 300px; height: 300px; bottom: -50px; right: -50px; background: rgba(0, 191, 255, 0.3); animation-delay: -5s; }

        @keyframes move {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(100px, 50px) scale(1.2); }
        }

        /* Main Liquid Glass Container */
        .glass-container {
            width: 90%;
            max-width: 500px;
            padding: 40px;
            text-align: center;
            position: relative;
            
            /* The Core Liquid Glass UI Properties */
            background: var(--glass-bg);
            backdrop-filter: blur(25px) saturate(160%);
            -webkit-backdrop-filter: blur(25px) saturate(160%);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            
            /* Specular highlight and depth */
            box-shadow: 
                0 8px 32px 0 rgba(0, 0, 0, 0.37),
                inset 0 0 15px rgba(255, 255, 255, 0.05);
            
            transition: transform 0.3s ease;
        }

        .glass-container:hover {
            transform: translateY(-5px);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            font-weight: 300;
            letter-spacing: 2px;
            background: linear-gradient(to right, #fff, var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 30px;
            opacity: 0.9;
            font-weight: 200;
        }

        /* Liquid Glass Button */
        .btn {
            display: inline-block;
            padding: 15px 35px;
            text-decoration: none;
            color: #fff;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 50px;
            font-weight: 500;
            backdrop-filter: blur(10px);
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            overflow: hidden;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
            letter-spacing: 1px;
        }

        /* Decorative Light Refraction Line */
        .glass-shine {
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(
                to right,
                transparent,
                rgba(255, 255, 255, 0.1),
                transparent
            );
            transform: skewX(-25deg);
            animation: shine 6s infinite;
        }

        @keyframes shine {
            0% { left: -100%; }
            20% { left: 150%; }
            100% { left: 150%; }
        }

        .photo-frame {
            width: 120px;
            height: 120px;
            margin: 0 auto 25px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
        }
    </style>
</head>
<body>

    <div class="bg-blobs">
        <div class="blob blob1"></div>
        <div class="blob blob2"></div>
    </div>

    <main class="glass-container">
        <div class="glass-shine"></div>
        
        <div class="photo-frame">
            🎂
        </div>

        <h1>Happy Birthday, Angelin!</h1>
        
        <p>Wishing you a day filled with magic, laughter, and all the things that make you happiest. May your year ahead be as brilliant as you are.</p>
        
        <a href="#" class="btn">Celebrate Now</a>
    </main>

    <script>
        // Optional: Interactive tilt effect for "Liquid" feel
        const card = document.querySelector('.glass-container');
        
        document.addEventListener('mousemove', (e) => {
            let xAxis = (window.innerWidth / 2 - e.pageX) / 25;
            let yAxis = (window.innerHeight / 2 - e.pageY) / 25;
            card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });

        // Reset on leave
        document.addEventListener('mouseleave', () => {
            card.style.transform = `rotateY(0deg) rotateX(0deg)`;
        });
    </script>
</body>
</html>
